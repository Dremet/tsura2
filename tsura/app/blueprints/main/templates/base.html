<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}TSURA{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="bg-carbon text-white">
    <!-- Responsive Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-carbon border-bottom border-danger">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('main.index') }}">
                <img src="{{ url_for('static', filename='img/tsura.png') }}" alt="TSURA logo" width="40" height="40"
                    class="me-2" />
                TSURA.ORG
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar"
                aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('main.index') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('main.hotlapping') }}">Hotlapping</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="#">Drivers</a></li> -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.elo_events') }}">ELO Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.elo_heats') }}">ELO Heats</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4 px-3">
        <div class="mx-auto" style="max-width: 1920px;">{% block content %}{% endblock %}</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tooltipTriggerList = [].slice.call(document.querySelectorAll("[data-bs-toggle='tooltip']"));
            tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
        });
    </script>
</body>

</html>
